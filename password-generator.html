<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор паролів</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/password-generator.css">
</head>
<body>
  <h1>Генератор паролів</h1>

  <div class="generator-card">
    <div class="options-grid">
      <label><input type="checkbox" id="lowercase" checked> Малі літери</label>
      <label><input type="checkbox" id="uppercase" checked> ВЕЛИКІ літери</label>
      <label><input type="checkbox" id="numbers" checked> Цифри</label>
      <label><input type="checkbox" id="symbols"> Символи</label>
    </div>

    <div class="length-row">
      <label>Довжина: <input type="number" id="length" value="12" min="4" max="64"></label>
    </div>

    <button class="generate-btn" onclick="generatePassword()">Згенерувати</button>

    <div class="password-row">
      <input id="generated-password" readonly>
    </div>
  </div>

  <script src="scripts/password-generator.js"></script>
</body>
</html>
